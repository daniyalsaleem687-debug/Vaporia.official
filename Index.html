<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaporia Official | Premium Vaporizer Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .gold-text { color: #D4AF37; }
        .gold-border { border-color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .premium-card { background: linear-gradient(145deg, #111, #000); border: 1px solid #222; }
        .premium-card:hover { border-color: #D4AF37; transition: 0.4s; }
    </style>
</head>
<body class="bg-black text-white">

    <header class="text-center py-12 border-b gold-border">
        <h1 class="text-4xl font-extrabold gold-text tracking-[0.2em] uppercase">Vaporia Official</h1>
        <p class="text-gray-500 mt-3 text-sm uppercase tracking-widest font-light">The Pinnacle of Vaping Luxury</p>
    </header>

    <section class="p-8 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-4">
            <div>
                <h2 class="text-3xl font-bold tracking-tight text-white">Curated Collection</h2>
                <p class="text-gray-400 mt-1">Exquisite devices for the refined enthusiast.</p>
            </div>
            <div id="cart-status" class="bg-white text-black px-5 py-2 rounded-sm font-bold text-xs uppercase tracking-tighter">
                Shopping Bag: <span id="cart-count">0</span> Items
            </div>
        </div>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <div class="premium-card p-8 rounded-sm text-center">
                <div class="bg-zinc-800 w-full h-48 mb-6 flex items-center justify-center rounded-sm text-gray-600 italic">Image Preview</div>
                <h3 class="text-xl font-semibold mb-2">OXVA Xlim Pro Edition</h3>
                <p class="gold-text text-lg font-medium mb-6 italic">PKR 3,200</p>
                <button onclick="addToCart('OXVA Xlim Pro', 3200)" class="gold-bg text-black font-bold w-full py-4 rounded-sm uppercase text-xs tracking-widest hover:brightness-110">Add to Bag</button>
            </div>
            <div class="premium-card p-8 rounded-sm text-center">
                <div class="bg-zinc-800 w-full h-48 mb-6 flex items-center justify-center rounded-sm text-gray-600 italic">Image Preview</div>
                <h3 class="text-xl font-semibold mb-2">Uwell Caliburn G3</h3>
                <p class="gold-text text-lg font-medium mb-6 italic">PKR 4,500</p>
                <button onclick="addToCart('Uwell Caliburn G3', 4500)" class="gold-bg text-black font-bold w-full py-4 rounded-sm uppercase text-xs tracking-widest hover:brightness-110">Add to Bag</button>
            </div>
        </div>
    </section>

    <div class="fixed bottom-10 right-10">
        <button onclick="checkoutOrder()" class="flex items-center gap-3 bg-white text-black px-10 py-5 rounded-sm font-black uppercase text-xs tracking-[0.15em] shadow-white/10 shadow-2xl transition hover:-translate-y-1">
            Complete Order via WhatsApp
        </button>
    </div>

    <script>
        let cart = [];
        function addToCart(name, price) {
            cart.push({ name, price });
            document.getElementById('cart-count').innerText = cart.length;
        }
        function checkoutOrder() {
            if (cart.length === 0) { alert("Your shopping bag is currently empty."); return; }
            let message = "Vaporia Official - Purchase Request\n\n";
            let total = 0;
            cart.forEach((item, index) => { message += `[${index + 1}] ${item.name} - PKR ${item.price}\n`; total += item.price; });
            message += `\nTotal Amount: PKR ${total}\n\nPlease confirm availability for these items.`;
            let phone = "923012112267"; 
            let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            window.open(url, "_blank");
        }
    </script>
</body>
</html>
