<!DOCTYPE html>
<html lang="en">
<
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaporia Official | Premium Vape Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .gold-text { color: #D4AF37; }
        .gold-border { border-color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
    </style>
</head>
<body class="bg-black text-white">

    <header class="text-center py-10 border-b gold-border">
        <h1 class="text-4xl font-bold gold-text uppercase tracking-widest">Vaporia Official</h1>
        <p class="text-gray-400 mt-2 italic">Premium Pod Systems & E-Liquids</p>
    </header>

    <section class="p-6 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-semibold border-l-4 gold-border pl-3">Our Collection</h2>
            <span id="cart-count" class="bg-red-600 text-white px-3 py-1 rounded-full text-sm">Cart: 0</span>
        </div>

        <div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
            
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 hover:gold-border transition duration-300">
                <img src="https://via.placeholder.com/200x200/1a1a1a/D4AF37?text=OXVA+Xlim" alt="OXVA" class="mx-auto mb-4 rounded-lg">
                <h3 class="text-xl font-bold mb-2">OXVA Xlim Pro</h3>
                <p class="gold-text text-lg font-bold mb-4">Rs 3,200</p>
                <button onclick="addToCart('OXVA Xlim Pro', 3200)" class="gold-bg text-black font-bold w-full py-3 rounded-lg hover:bg-yellow-600 transition">
                    Add to Cart
                </button>
            </div>

            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 hover:gold-border transition duration-300">
                <img src="https://via.placeholder.com/200x200/1a1a1a/D4AF37?text=Caliburn" alt="Caliburn" class="mx-auto mb-4 rounded-lg">
                <h3 class="text-xl font-bold mb-2">Uwell Caliburn G3</h3>
                <p class="gold-text text-lg font-bold mb-4">Rs 4,500</p>
                <button onclick="addToCart('Uwell Caliburn G3', 4500)" class="gold-bg text-black font-bold w-full py-3 rounded-lg hover:bg-yellow-600 transition">
                    Add to Cart
                </button>
            </div>

        </div>
    </section>

    <div class="fixed bottom-8 right-8 z-50">
        <button onclick="sendOrder()" class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-full font-bold shadow-2xl transition transform hover:scale-105">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
            </svg>
            Checkout on WhatsApp
        </button>
    </div>

    <script>
        let cart = [];

        function addToCart(name, price) {
            cart.push({ name, price });
            document.getElementById('cart-count').innerText = `Cart: ${cart.length}`;
            alert(`${name} cart mein add ho gaya!`);
        }

        function sendOrder() {
            if (cart.length === 0) {
                alert("Pehle koi product select karein!");
                return;
            }

            let message = "Vaporia Official Order:\n------------------\n";
            let total = 0;

            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} - Rs ${item.price}\n`;
                total += item.price;
            });

            message += `------------------\nTotal: Rs ${total}\n\nPlease confirm my order.`;
            
            // Your correct phone number with country code
            let phone = "923012112267"; 
            let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            window.open(url, "_blank");
        }
    </script>
</body>
</html>
